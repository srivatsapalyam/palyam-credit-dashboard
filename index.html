<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyam Enterprises - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .tab-hidden { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <header class="border-b border-zinc-800 bg-zinc-900/90 backdrop-blur-md px-4 py-4 shrink-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold tracking-wider uppercase text-zinc-400">Palyam Enterprises</h1>
                <p id="header-subtitle" class="text-xs text-zinc-500">Receivables & Credit</p>
            </div>
            <button onclick="window.location.reload(true)" class="inline-flex items-center rounded-md bg-zinc-800 px-2 py-1 text-xs font-medium text-zinc-300 border border-zinc-700 active:bg-zinc-700">
                ↻ Sync
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
        
        <div id="view-receivables" class="max-w-md mx-auto px-4 mt-6 space-y-6">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Outstanding</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-total">₹0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Avg DSO</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-dso">0 Days</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400">Contractor Ledger</h2>
                    <button onclick="openModal('credit-modal')" class="bg-zinc-100 text-zinc-950 text-xs font-bold py-1 px-3 rounded flex items-center gap-1 hover:bg-zinc-200">
                        + Add Client
                    </button>
                </div>
                <div id="contractor-list" class="space-y-2.5"></div>
            </section>
        </div>

        <div id="view-inventory" class="max-w-md mx-auto px-4 mt-6 space-y-6 tab-hidden">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Stock Alerts</p>
                    <p class="text-xl font-bold mt-1 text-red-400" id="kpi-alerts">0 Items</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Capital in Stock</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-capital">₹0</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs
