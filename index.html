<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyam Enterprises - Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 2px; }
        /* Hide number input arrows for a cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased min-h-screen">

    <header class="bg-zinc-900/95 backdrop-blur-md border-b border-zinc-800 sticky top-0 z-50 px-4 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-sm font-black tracking-widest uppercase text-blue-500">Palyam Enterprises</h1>
                <p class="text-xs text-zinc-400 font-medium tracking-wide mt-0.5">Official Estimator Tool</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-zinc-500 uppercase tracking-wider">Date</p>
                <p class="text-xs font-bold text-zinc-300" id="header-date">--</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6 space-y-6">

        <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-lg shadow-black/50 space-y-4 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-blue-400"></div>
            
            <h2 class="text-sm font-bold tracking-wide text-zinc-100 flex items-center gap-2">
                <span class="bg-blue-500/20 text-blue-400 rounded bg-opacity-20 px-1.5 py-0.5 text-xs">1</span>
                Add Line Item
            </h2>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-semibold uppercase tracking-wider text-zinc-500 ml-1">Item Description</label>
                    <input type="text" id="quote-item-name" placeholder="e.g. Ramco Cement 50kg" class="w-full mt-1 bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-zinc-700">
                </div>
                
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-[10px] font-semibold uppercase tracking-wider text-zinc-500 ml-1">Unit Price (₹)</label>
                        <input type="number" id="quote-item-cost" placeholder="0.00" min="0" class="w-full mt-1 bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-zinc-700">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-semibold uppercase tracking-wider text-zinc-500 ml-1">Quantity</label>
                        <input type="number" id="quote-item-qty" placeholder="1" min="1" class="w-full mt-1 bg-zinc-950 border border-zinc-700 rounded-xl p-3 text-sm text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-zinc-700 text-center">
                    </div>
                </div>

                <button onclick="addToQuote()" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-3.5 rounded-xl transition-colors shadow-lg shadow-blue-900/20 mt-2">
                    + Add to Estimate
                </button>
            </div>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-lg shadow-black/50 space-y-4">
            <div class="flex justify-between items-end border-b border-zinc-800 pb-3">
                <h2 class="text-sm font-bold tracking-wide text-zinc-100 flex items-center gap-2">
                    <span class="bg-blue-500/20 text-blue-400 rounded bg-opacity-20 px-1.5 py-0.5 text-xs">2</span>
                    Current Estimate
                </h2>
                <button onclick="clearQuote()" class="text-xs font-semibold text-zinc-500 hover:text-red-400 transition-colors">Clear All</button>
            </div>

            <div id="quote-list" class="space-y-3 min-h-[80px]">
                </div>

            <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 flex justify-between items-center mt-4">
                <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">Grand Total</span>
                <span class="text-2xl font-black text-blue-400" id="quote-total">₹0</span>
            </div>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 shadow-lg shadow-black/50 space-y-4">
            <h2 class="text-sm font-bold tracking-wide text-zinc-100 flex items-center gap-2">
                <span class="bg-blue-500/20 text-blue-400 rounded bg-opacity-20 px-1.5 py-0.5 text-xs">3</span>
                Send to Customer
            </h2>
            
            <div>
                <label class="text-[10px] font-semibold uppercase tracking-wider text-zinc-500 ml-1">Customer WhatsApp No.</label>
                <div class="flex mt-1">
                    <span class="bg-zinc-800 border border-zinc-700 border-r-0 rounded-l-xl px-3 py-3 text-sm text-zinc-400 flex items-center">+91</span>
                    <input type="tel" id="quote-customer-phone" placeholder="98765 43210" class="w-full bg-zinc-950 border border-zinc-700 rounded-r-xl p-3 text-sm text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder:text-zinc-700">
                </div>
            </div>
            
            <button onclick="sendQuoteWhatsApp()" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 text-sm font-black py-4 rounded-xl transition-colors shadow-lg flex justify-center items-center gap-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                Send via WhatsApp
            </button>
        </section>

    </main>

    <script>
        // Set today's date in header
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-IN', options);

        // Formatting Utility
        const formatMoney = (amt) => '₹' + parseInt(amt).toLocaleString('en-IN');

        // State Management
        let currentQuote = []; 

        function addToQuote() {
            const nameInput = document.getElementById('quote-item-name').value.trim();
            const costInput = parseFloat(document.getElementById('quote-item-cost').value);
            const qtyInput = parseInt(document.getElementById('quote-item-qty').value);
            
            if (!nameInput) { alert("Please enter an item description."); return; }
            if (isNaN(costInput) || costInput < 0) { alert("Please enter a valid price."); return; }
            if (isNaN(qtyInput) || qtyInput <= 0) { alert("Please enter a valid quantity."); return; }
            
            currentQuote.push({
                id: Date.now(),
                name: nameInput,
                cost: costInput,
                qty: qtyInput
            });
            
            // Clear inputs and refocus on name for rapid entry
            document.getElementById('quote-item-name').value = '';
            document.getElementById('quote-item-cost').value = '';
            document.getElementById('quote-item-qty').value = '';
            document.getElementById('quote-item-name').focus();
            
            renderQuoteUI();
        }

        function removeFromQuote(id) {
            currentQuote = currentQuote.filter(i => i.id !== id);
            renderQuoteUI();
        }

        function clearQuote() {
            if(currentQuote.length === 0) return;
            if(confirm('Clear the current estimate?')) {
                currentQuote = [];
                renderQuoteUI();
            }
        }

        function renderQuoteUI() {
            const list = document.getElementById('quote-list');
            list.innerHTML = '';
            let grandTotal = 0;

            if (currentQuote.length === 0) {
                list.innerHTML = `<div class="text-center py-6 border border-dashed border-zinc-800 rounded-xl"><p class="text-xs text-zinc-600 italic">No items added yet.</p></div>`;
            } else {
                currentQuote.forEach((item, index) => {
                    const lineTotal = item.cost * item.qty;
                    grandTotal += lineTotal;
                    
                    list.innerHTML += `
                    <div class="flex justify-between items-center bg-zinc-950 p-3 rounded-xl border border-zinc-800 relative group">
                        <div class="space-y-1">
                            <p class="text-sm font-semibold text-zinc-100">${item.name}</p>
                            <p class="text-[11px] text-zinc-500 tracking-wide">${item.qty} units × ${formatMoney(item.cost)}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="text-sm font-bold text-zinc-200">${formatMoney(lineTotal)}</p>
                            <button onclick="removeFromQuote(${item.id})" class="text-zinc-600 hover:text-red-400 font-bold p-1 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
                });
            }
            
            document.getElementById('quote-total').innerText = formatMoney(grandTotal);
        }

        function sendQuoteWhatsApp() {
            if (currentQuote.length === 0) {
                alert("Please add items to the estimate before sending.");
                return;
            }

            let phone = document.getElementById('quote-customer-phone').value.replace(/\D/g,''); // Strip non-numbers
            if (!phone || phone.length < 10) {
                alert("Please enter a valid 10-digit WhatsApp number.");
                return;
            }

            // Generate a random 4-digit Estimate ID
            const estId = Math.floor(1000 + Math.random() * 9000);
            const dateStr = new Date().toLocaleDateString('en-IN');

            let message = `*PALYAM ENTERPRISES*\n_Hardware & Supply Estimate_\n`;
            message += `Est ID: #EST-${estId}\nDate: ${dateStr}\n------------------------\n\n`;
            
            let grandTotal = 0;
            currentQuote.forEach((item, index) => {
                const lineTotal = item.cost * item.qty;
                grandTotal += lineTotal;
                message += `*${index + 1}. ${item.name}*\n`;
                message += `${item.qty} x ${formatMoney(item.cost)} = *${formatMoney(lineTotal)}*\n\n`;
            });
            
            message += `------------------------\n`;
            message += `*GRAND TOTAL: ${formatMoney(grandTotal)}*\n\n`;
            message += `_This is a digitally generated estimate. Please reply to this message to confirm your order._`;

            // Format phone for India code if not present
            if (!phone.startsWith('91') && phone.length === 10) phone = '91' + phone;

            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`, '_blank');
        }

        // Initialize empty state
        window.onload = renderQuoteUI;
    </script>
</body>
</html>
