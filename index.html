<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyam Enterprises - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .tab-hidden { display: none !important; }
        input[type="date"] { color-scheme: dark; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased min-h-screen relative pb-24">

    <header class="border-b border-zinc-800 bg-zinc-900/90 sticky top-0 backdrop-blur-md px-4 py-4 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold tracking-wider uppercase text-zinc-400">Palyam Enterprises</h1>
                <p id="header-subtitle" class="text-xs text-zinc-500">Receivables & Credit</p>
            </div>
            <button onclick="window.location.reload(true)" class="inline-flex items-center rounded-md bg-zinc-800 px-2 py-1 text-xs font-medium text-zinc-300 border border-zinc-700 active:bg-zinc-700">
                ↻ Sync
            </button>
        </div>
    </header>

    <main class="w-full">
        <div id="view-receivables" class="max-w-md mx-auto px-4 mt-6 space-y-6">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Outstanding</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-total">₹0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Avg DSO</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-dso">0 Days</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400">Contractor Ledger</h2>
                    <button onclick="openCreditModal()" class="bg-zinc-100 text-zinc-950 text-xs font-bold py-1 px-3 rounded flex items-center gap-1 hover:bg-zinc-200">
                        + Add Client
                    </button>
                </div>
                <div id="contractor-list" class="space-y-2.5"></div>
            </section>
        </div>

        <div id="view-inventory" class="max-w-md mx-auto px-4 mt-6 space-y-6 tab-hidden">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Stock Alerts</p>
                    <p class="text-xl font-bold mt-1 text-red-400" id="kpi-alerts">0 Items</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Capital in Stock</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-capital">₹0</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400">Inventory Monitor</h2>
                    <button onclick="openInventoryModal()" class="bg-zinc-100 text-zinc-950 text-xs font-bold py-1 px-3 rounded flex items-center gap-1 hover:bg-zinc-200">
                        + Add Stock
                    </button>
                </div>
                <div id="inventory-list" class="space-y-2.5"></div>
            </section>
        </div>

        <div id="view-quote" class="max-w-md mx-auto px-4 mt-6 space-y-6 tab-hidden">
            <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 space-y-4">
                <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400 border-b border-zinc-800 pb-2">Draft Customer Quote</h2>
                
                <div class="flex gap-2">
                    <div class="flex-1">
                        <select id="quote-item-select" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500 appearance-none">
                            <option value="">Select Item...</option>
                            </select>
                    </div>
                    <div class="w-20">
                        <input type="number" id="quote-item-qty" placeholder="Qty" min="1" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500 text-center">
                    </div>
                    <button onclick="addToQuote()" class="bg-zinc-100 text-zinc-950 font-bold px-3 rounded hover:bg-zinc-200">
                        +
                    </button>
                </div>

                <div id="quote-list" class="space-y-2 pt-2 min-h-[100px]">
                    <p class="text-center text-xs text-zinc-600 italic pt-4">No items added to quote yet.</p>
                </div>

                <div class="flex justify-between items-end border-t border-zinc-800 pt-3">
                    <span class="text-sm font-medium text-zinc-400">Grand Total</span>
                    <span class="text-xl font-bold text-zinc-100" id="quote-total">₹0</span>
                </div>
            </div>

            <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 space-y-3">
                <div>
                    <label class="text-xs text-zinc-400">Customer WhatsApp Number</label>
                    <input type="tel" id="quote-customer-phone" placeholder="e.g. 9876543210" class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500">
                </div>
                <button onclick="sendQuoteWhatsApp()" class="w-full bg-zinc-100 text-zinc-950 text-sm font-bold py-3 rounded flex justify-center items-center gap-2 hover:bg-zinc-200">
                    Send Professional Quote
                </button>
                <button onclick="clearQuote()" class="w-full text-zinc-500 text-xs font-semibold py-2 hover:text-red-400 transition-colors">
                    Clear Quote Data
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-zinc-950 border-t border-zinc-800 z-50">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchTab('receivables')" id="nav-receivables" class="flex-1 py-4 text-xs font-bold text-zinc-100 border-t-2 border-zinc-100 transition-all">
                💰 Credit
            </button>
            <button onclick="switchTab('inventory')" id="nav-inventory" class="flex-1 py-4 text-xs font-bold text-zinc-500 border-t-2 border-transparent transition-all">
                📦 Inventory
            </button>
            <button onclick="switchTab('quote')" id="nav-quote" class="flex-1 py-4 text-xs font-bold text-zinc-500 border-t-2 border-transparent transition-all">
                📝 Quote
            </button>
        </div>
    </nav>

    <div id="credit-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[60] hidden flex justify-center items-center px-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-md p-5 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-zinc-100 border-b border-zinc-800 pb-2">Add New Credit Account</h3>
            <form onsubmit="addContractor(event)" class="space-y-3">
                <div><label class="text-xs text-zinc-400">Business Name</label><input type="text" id="c-name" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Amount (₹)</label><input type="number" id="c-amount" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Date of Purchase</label><input type="date" id="c-date" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Limit (₹)</label><input type="number" id="c-limit" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Phone No.</label><input type="tel" id="c-phone" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="flex gap-3 pt-3">
                    <button type="button" onclick="closeModal('credit-modal')" class="flex-1 py-2 rounded border border-zinc-700 text-zinc-300 text-sm font-semibold hover:bg-zinc-800">Cancel</button>
                    <button type="submit" class="flex-1 py-2 rounded bg-zinc-100 text-zinc-950 text-sm font-bold hover:bg-zinc-200">Save Account</button>
                </div>
            </form>
        </div>
    </div>

    <div id="inventory-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[60] hidden flex justify-center items-center px-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-md p-5 space-y-4 shadow-2xl">
            <h3 id="inv-modal-title" class="text-lg font-bold text-zinc-100 border-b border-zinc-800 pb-2">Add / Edit Inventory</h3>
            <form onsubmit="saveInventory(event)" class="space-y-3">
                <input type="hidden" id="i-id">
                <div><label class="text-xs text-zinc-400">Item Name</label><input type="text" id="i-name" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Current Stock</label><input type="number" id="i-current" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Reorder Point</label><input type="number" id="i-reorder" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Supplier Name</label><input type="text" id="i-supplier" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Unit Cost (₹)</label><input type="number" id="i-cost" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div><label class="text-xs text-zinc-400">Supplier Phone (For WhatsApp)</label><input type="tel" id="i-phone" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                <div class="flex gap-3 pt-3">
                    <button type="button" onclick="closeModal('inventory-modal')" class="flex-1 py-2 rounded border border-zinc-700 text-zinc-300 text-sm font-semibold hover:bg-zinc-800">Cancel</button>
                    <button type="submit" class="flex-1 py-2 rounded bg-zinc-100 text-zinc-950 text-sm font-bold hover:bg-zinc-200">Save Stock</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Formatting & Date Utilities
        const formatMoney = (amt) => '₹' + parseInt(amt).toLocaleString('en-IN');
        
        function calculateDaysPending(dateString) {
            const purchaseDate = new Date(dateString);
            const today = new Date();
            purchaseDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            const diffTime = today - purchaseDate;
            return diffTime < 0 ? 0 : Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        // ================= TAB NAVIGATION =================
        function switchTab(tab) {
            // Hide all views
            ['view-receivables', 'view-inventory', 'view-quote'].forEach(id => {
                document.getElementById(id).classList.add('tab-hidden');
            });
            // Reset all nav styles
            ['nav-receivables', 'nav-inventory', 'nav-quote'].forEach(id => {
                document.getElementById(id).className = "flex-1 py-4 text-xs font-bold text-zinc-500 border-t-2 border-transparent transition-all";
            });

            // Activate chosen view
            document.getElementById(`view-${tab}`).classList.remove('tab-hidden');
            document.getElementById(`nav-${tab}`).className = "flex-1 py-4 text-xs font-bold text-zinc-100 border-t-2 border-zinc-100 transition-all";

            // Update Header Subtitle
            const subtitles = {
                'receivables': 'Receivables & Credit',
                'inventory': 'Supply & Stock Alerts',
                'quote': 'Instant Estimator'
            };
            document.getElementById('header-subtitle').innerText = subtitles[tab];

            // If entering quote tab, refresh the dropdown from inventory data
            if (tab === 'quote') populateQuoteDropdown();
        }

        // ================= MODAL CONTROLS =================
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openCreditModal() {
            document.getElementById('c-date').value = getTodayString();
            openModal('credit-modal');
        }

        // ================= DATA LOADING =================
        let creditData = [];
        let invData = [];
        let currentQuote = []; // Temporary memory for the active quote
        
        try { creditData = JSON.parse(localStorage.getItem('palyam_credit')) || []; } catch(e) { creditData = []; }
        try { invData = JSON.parse(localStorage.getItem('palyam_inventory')) || []; } catch(e) { invData = []; }

        // ================= RECEIVABLES & INVENTORY (Standard Engine) =================
        // [Existing logic remains unchanged for Credit and Inventory tabs]
        function renderCredit() {
            const list = document.getElementById('contractor-list');
            list.innerHTML = ''; let total = 0; let totalDays = 0;
            if (creditData.length === 0) { list.innerHTML = `<div class="text-center py-8 text-zinc-600 text-xs border border-dashed border-zinc-800 rounded-lg">No accounts found.</div>`; } 
            else {
                creditData.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(item => {
                    const daysPending = calculateDaysPending(item.date);
                    total += parseInt(item.amount); totalDays += daysPending;
                    let status = "Current"; let color = "text-zinc-400 bg-zinc-900 border-zinc-800";
                    if (item.amount >= item.limit || daysPending >= 30) { status = "Critical"; color = "text-red-400 bg-red-950/30 border-red-900/50"; }
                    else if (daysPending >= 15) { status = "Overdue"; color = "text-amber-400 bg-amber-950/30 border-amber-900/50"; }
                    const displayDate = new Date(item.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                    list.innerHTML += `<div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4 space-y-3 relative"><button onclick="deleteCredit(${item.id})" class="absolute top-2 right-3 text-zinc-600 hover:text-red-400 text-xl font-bold px-2">×</button><div class="flex justify-between items-start pr-8"><div><h3 class="text-sm font-semibold text-zinc-100">${item.name}</h3><p class="text-xs text-zinc-500">${daysPending} days pending <span class="text-zinc-700 mx-1">•</span> <span class="text-zinc-600">${displayDate}</span></p></div><div class="text-right"><p class="text-sm font-bold text-zinc-200">${formatMoney(item.amount)}</p><span class="text-[10px] font-mono px-2 py-0.5 rounded border ${color}">${status}</span></div></div><div class="flex gap-2 pt-2 border-t border-zinc-800"><button onclick="pingWhatsApp('${item.phone}', 'Reminder: ₹${item.amount} from your purchase on ${displayDate} has been pending for ${daysPending} days.')" class="flex-1 bg-zinc-100 text-zinc-950 text-xs font-bold py-2 rounded hover:bg-zinc-200">Ping WhatsApp</button></div></div>`;
                });
            }
            document.getElementById('kpi-total').innerText = formatMoney(total);
            document.getElementById('kpi-dso').innerText = creditData.length ? Math.round(totalDays / creditData.length) + ' Days' : '0 Days';
        }

        function addContractor(e) {
            e.preventDefault();
            creditData.unshift({ id: Date.now(), name: document.getElementById('c-name').value, amount: document.getElementById('c-amount').value, date: document.getElementById('c-date').value, limit: document.getElementById('c-limit').value, phone: document.getElementById('c-phone').value });
            localStorage.setItem('palyam_credit', JSON.stringify(creditData)); e.target.reset(); closeModal('credit-modal'); renderCredit();
        }

        function deleteCredit(id) { if(confirm('Are you sure you want to clear this account?')) { creditData = creditData.filter(i => i.id !== id); localStorage.setItem('palyam_credit', JSON.stringify(creditData)); renderCredit(); } }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = ''; let alerts = 0; let capital = 0;
            if (invData.length === 0) { list.innerHTML = `<div class="text-center py-8 text-zinc-600 text-xs border border-dashed border-zinc-800 rounded-lg">No inventory found.</div>`; } 
            else {
                [...invData].sort((a, b) => (a.current - a.reorder) - (b.current - b.reorder)).forEach(item => {
                    capital += (parseInt(item.current) * parseInt(item.cost));
                    let status = "In Stock"; let color = "text-emerald-400 bg-emerald-950/30 border-emerald-900/50";
                    if (item.current <= 0) { status = "Out of Stock"; color = "text-red-400 bg-red-950/30 border-red-900/50"; alerts++; }
                    else if (item.current <= item.reorder) { status = "Low Stock"; color = "text-amber-400 bg-amber-950/30 border-amber-900/50"; alerts++; }

                    list.innerHTML += `<div class="bg-zinc-900 border ${item.current <= 0 ? 'border-red-900/50' : 'border-zinc-800'} rounded-lg p-4 space-y-3 relative"><button onclick="deleteInventory(${item.id})" class="absolute top-2 right-3 text-zinc-600 hover:text-red-400 text-xl font-bold px-2">×</button><div class="flex justify-between items-start pr-8"><div><h3 class="text-sm font-semibold text-zinc-100">${item.name}</h3><p class="text-xs text-zinc-500 mt-0.5">Supplier: ${item.supplier}</p></div><div class="flex flex-col items-end gap-1.5"><span class="text-[10px] font-mono px-2 py-0.5 rounded border ${color}">${status}</span><button onclick="openInventoryModal(${item.id})" class="text-xs text-blue-400 font-medium hover:underline px-2">Edit Stock</button></div></div><div class="flex items-center justify-between text-xs font-mono text-zinc-400 bg-zinc-950 px-3 py-2 rounded border border-zinc-800/50"><span>Current: ${item.current}</span><span>Reorder Pt: ${item.reorder}</span></div>${item.current <= item.reorder ? `<button onclick="pingWhatsApp('${item.phone}', 'Hello ${item.supplier}, we need to urgently reorder: ${item.name}. Please confirm dispatch.')" class="w-full bg-zinc-100 text-zinc-950 text-xs font-bold py-2 rounded hover:bg-zinc-200">WhatsApp Supplier</button>` : ''}</div>`;
                });
            }
            document.getElementById('kpi-alerts').innerText = alerts + ' Items'; document.getElementById('kpi-capital').innerText = formatMoney(capital);
        }

        function openInventoryModal(id = null) {
            const form = document.querySelector('#inventory-modal form');
            if (id) { const item = invData.find(i => i.id === id); document.getElementById('i-id').value = item.id; document.getElementById('i-name').value = item.name; document.getElementById('i-current').value = item.current; document.getElementById('i-reorder').value = item.reorder; document.getElementById('i-supplier').value = item.supplier; document.getElementById('i-cost').value = item.cost; document.getElementById('i-phone').value = item.phone; document.getElementById('inv-modal-title').innerText = "Edit Stock Levels"; } 
            else { form.reset(); document.getElementById('i-id').value = ''; document.getElementById('inv-modal-title').innerText = "Add New Inventory Item"; }
            openModal('inventory-modal');
        }

        function saveInventory(e) {
            e.preventDefault(); const id = document.getElementById('i-id').value;
            const newItem = { id: id ? parseInt(id) : Date.now(), name: document.getElementById('i-name').value, current: parseInt(document.getElementById('i-current').value), reorder: parseInt(document.getElementById('i-reorder').value), supplier: document.getElementById('i-supplier').value, cost: parseInt(document.getElementById('i-cost').value), phone: document.getElementById('i-phone').value };
            if (id) { invData = invData.map(i => i.id === parseInt(id) ? newItem : i); } else { invData.push(newItem); }
            localStorage.setItem('palyam_inventory', JSON.stringify(invData)); closeModal('inventory-modal'); renderInventory(); populateQuoteDropdown();
        }

        function deleteInventory(id) { if(confirm('Are you sure you want to delete this inventory item?')) { invData = invData.filter(i => i.id !== id); localStorage.setItem('palyam_inventory', JSON.stringify(invData)); renderInventory(); populateQuoteDropdown(); } }

        function pingWhatsApp(phone, msg) { let p = phone; if (!p.startsWith('91') && p.length === 10) p = '91' + p; window.open(`https://api.whatsapp.com/send?phone=${p}&text=${encodeURIComponent(msg)}`, '_blank'); }

        // ================= NEW QUOTE ESTIMATOR LOGIC =================
        
        function populateQuoteDropdown() {
            const select = document.getElementById('quote-item-select');
            select.innerHTML = '<option value="">Select Item from Inventory...</option>';
            invData.forEach(item => {
                // Add item to dropdown, showing name and price
                select.innerHTML += `<option value="${item.id}">${item.name} (${formatMoney(item.cost)})</option>`;
            });
        }

        function addToQuote() {
            const selectId = document.getElementById('quote-item-select').value;
            const qtyInput = document.getElementById('quote-item-qty').value;
            
            if(!selectId || !qtyInput || qtyInput <= 0) return; // Prevent empty adds
            
            // Find the item details from the inventory database
            const itemDetails = invData.find(i => i.id === parseInt(selectId));
            
            // Push to our temporary quote list
            currentQuote.push({
                id: Date.now(),
                name: itemDetails.name,
                cost: itemDetails.cost,
                qty: parseInt(qtyInput)
            });
            
            // Reset the form inputs
            document.getElementById('quote-item-select').value = '';
            document.getElementById('quote-item-qty').value = '';
            
            renderQuoteUI();
        }

        function removeFromQuote(id) {
            currentQuote = currentQuote.filter(i => i.id !== id);
            renderQuoteUI();
        }

        function clearQuote() {
            currentQuote = [];
            document.getElementById('quote-customer-phone').value = '';
            renderQuoteUI();
        }

        function renderQuoteUI() {
            const list = document.getElementById('quote-list');
            list.innerHTML = '';
            let grandTotal = 0;

            if (currentQuote.length === 0) {
                list.innerHTML = `<p class="text-center text-xs text-zinc-600 italic pt-4">No items added to quote yet.</p>`;
            } else {
                currentQuote.forEach((item, index) => {
                    const lineTotal = item.cost * item.qty;
                    grandTotal += lineTotal;
                    
                    list.innerHTML += `
                    <div class="flex justify-between items-center bg-zinc-950 p-2 rounded border border-zinc-800 relative">
                        <div class="space-y-0.5">
                            <p class="text-xs font-semibold text-zinc-100">${index + 1}. ${item.name}</p>
                            <p class="text-[10px] text-zinc-500">${item.qty} units x ${formatMoney(item.cost)}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <p class="text-sm font-bold text-zinc-200">${formatMoney(lineTotal)}</p>
                            <button onclick="removeFromQuote(${item.id})" class="text-zinc-600 hover:text-red-400 font-bold px-1">×</button>
                        </div>
                    </div>`;
                });
            }
            
            document.getElementById('quote-total').innerText = formatMoney(grandTotal);
        }

        function sendQuoteWhatsApp() {
            if (currentQuote.length === 0) {
                alert("Please add items to the quote first.");
                return;
            }

            const phone = document.getElementById('quote-customer-phone').value;
            if (!phone) {
                alert("Please enter the customer's WhatsApp number.");
                return;
            }

            // Build the professional text receipt
            let message = `*PALYAM ENTERPRISES*\n_Hardware & Supply Estimate_\n------------------------\n\n`;
            
            let grandTotal = 0;
            currentQuote.forEach((item, index) => {
                const lineTotal = item.cost * item.qty;
                grandTotal += lineTotal;
                message += `*${index + 1}. ${item.name}*\n`;
                message += `${item.qty} x ${formatMoney(item.cost)} = *${formatMoney(lineTotal)}*\n\n`;
            });
            
            message += `------------------------\n`;
            message += `*Total Estimate: ${formatMoney(grandTotal)}*\n\n`;
            message += `_Please let us know if you would like to proceed with this order. Thank you!_`;

            // Trigger WhatsApp
            pingWhatsApp(phone, message);
        }

        // Boot app
        window.onload = () => {
            renderCredit();
            renderInventory();
            populateQuoteDropdown();
        };
    </script>
</body>
</html>
