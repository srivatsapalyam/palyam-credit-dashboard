<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palyam Enterprises - Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .tab-hidden { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <header class="border-b border-zinc-800 bg-zinc-900/90 backdrop-blur-md px-4 py-4 shrink-0">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold tracking-wider uppercase text-zinc-400">Palyam Enterprises</h1>
                <p id="header-subtitle" class="text-xs text-zinc-500">Receivables & Credit</p>
            </div>
            <button onclick="window.location.reload()" class="inline-flex items-center rounded-md bg-zinc-800 px-2 py-1 text-xs font-medium text-zinc-300 border border-zinc-700 active:bg-zinc-700">
                ↻ Sync
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
        
        <div id="view-receivables" class="max-w-md mx-auto px-4 mt-6 space-y-6">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Outstanding</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-total">₹0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Avg DSO</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-dso">0 Days</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400">Contractor Ledger</h2>
                    <button onclick="openModal('credit-modal')" class="bg-zinc-100 text-zinc-950 text-xs font-bold py-1 px-3 rounded flex items-center gap-1 hover:bg-zinc-200">
                        + Add Client
                    </button>
                </div>
                <div id="contractor-list" class="space-y-2.5"></div>
            </section>
        </div>

        <div id="view-inventory" class="max-w-md mx-auto px-4 mt-6 space-y-6 tab-hidden">
            <section class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Stock Alerts</p>
                    <p class="text-xl font-bold mt-1 text-red-400" id="kpi-alerts">0 Items</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
                    <p class="text-xs font-medium text-zinc-400 uppercase tracking-tight">Capital in Stock</p>
                    <p class="text-xl font-bold mt-1 text-zinc-100" id="kpi-capital">₹0</p>
                </div>
            </section>
            
            <section class="space-y-3">
                <div class="flex justify-between items-center">
                    <h2 class="text-xs font-semibold tracking-wider uppercase text-zinc-400">Inventory Monitor</h2>
                    <button onclick="openInventoryModal()" class="bg-zinc-100 text-zinc-950 text-xs font-bold py-1 px-3 rounded flex items-center gap-1 hover:bg-zinc-200">
                        + Add Stock
                    </button>
                </div>
                <div id="inventory-list" class="space-y-2.5"></div>
            </section>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-zinc-950 border-t border-zinc-800 pb-safe z-40">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchTab('receivables')" id="nav-receivables" class="flex-1 py-4 text-xs font-bold text-zinc-100 border-t-2 border-zinc-100 transition-all">
                💰 Credit
            </button>
            <button onclick="switchTab('inventory')" id="nav-inventory" class="flex-1 py-4 text-xs font-bold text-zinc-500 border-t-2 border-transparent transition-all">
                📦 Inventory
            </button>
        </div>
    </nav>

    <div id="credit-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex justify-center items-center px-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-md p-5 space-y-4">
            <h3 class="text-lg font-bold text-zinc-100 border-b border-zinc-800 pb-2">Add New Credit Account</h3>
            <form onsubmit="addContractor(event)" class="space-y-3">
                <div><label class="text-xs text-zinc-400">Business Name</label><input type="text" id="c-name" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Amount (₹)</label><input type="number" id="c-amount" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Days Pending</label><input type="number" id="c-days" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Limit (₹)</label><input type="number" id="c-limit" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Phone No.</label><input type="tel" id="c-phone" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="flex gap-3 pt-3">
                    <button type="button" onclick="closeModal('credit-modal')" class="flex-1 py-2 rounded border border-zinc-700 text-zinc-300 text-sm font-semibold">Cancel</button>
                    <button type="submit" class="flex-1 py-2 rounded bg-zinc-100 text-zinc-950 text-sm font-bold">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="inventory-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex justify-center items-center px-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-lg w-full max-w-md p-5 space-y-4">
            <h3 id="inv-modal-title" class="text-lg font-bold text-zinc-100 border-b border-zinc-800 pb-2">Add / Edit Inventory</h3>
            <form onsubmit="saveInventory(event)" class="space-y-3">
                <input type="hidden" id="i-id">
                <div><label class="text-xs text-zinc-400">Item Name</label><input type="text" id="i-name" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Current Stock</label><input type="number" id="i-current" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Reorder Point</label><input type="number" id="i-reorder" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-xs text-zinc-400">Supplier Name</label><input type="text" id="i-supplier" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                    <div><label class="text-xs text-zinc-400">Unit Cost (₹)</label><input type="number" id="i-cost" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                </div>
                <div><label class="text-xs text-zinc-400">Supplier Phone (For WhatsApp)</label><input type="tel" id="i-phone" required class="w-full mt-1 bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-zinc-100 focus:outline-none focus:border-zinc-500"></div>
                
                <div class="flex gap-3 pt-3">
                    <button type="button" onclick="closeModal('inventory-modal')" class="flex-1 py-2 rounded border border-zinc-700 text-zinc-300 text-sm font-semibold">Cancel</button>
                    <button type="submit" class="flex-1 py-2 rounded bg-zinc-100 text-zinc-950 text-sm font-bold">Save Stock</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Formatting Utility
        const formatMoney = (amt) => '₹' + parseInt(amt).toLocaleString('en-IN');

        // ================= TAB NAVIGATION =================
        function switchTab(tab) {
            document.getElementById('view-receivables').classList.add('tab-hidden');
            document.getElementById('view-inventory').classList.add('tab-hidden');
            document.getElementById('nav-receivables').className = "flex-1 py-4 text-xs font-bold text-zinc-500 border-t-2 border-transparent transition-all";
            document.getElementById('nav-inventory').className = "flex-1 py-4 text-xs font-bold text-zinc-50
